name: Agent Council Sync

on:
  workflow_dispatch:
  push:
    branches:
      - "codex/agent-council/**"

concurrency:
  group: agent-council-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  summarize-agent-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout triggering branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck branch
        run: npm run typecheck

      - name: Publish branch plan summary
        shell: bash
        run: |
          echo "# Agent Council Branch" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if ls .github/agent-council/*.md >/dev/null 2>&1; then
            for plan in .github/agent-council/*.md; do
              echo "## $(basename "$plan")" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              cat "$plan" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "No agent council plan files were found on this branch." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload branch plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-council-branch
          path: .github/agent-council
