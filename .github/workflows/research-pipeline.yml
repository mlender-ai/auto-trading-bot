name: Research Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 14 * * *"

permissions:
  contents: read

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    env:
      RESEARCH_PIPELINE_PROVIDER: auto
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate research pipeline
        run: npm run research:generate

      - name: Publish agent thread to job summary
        run: cat generated/research/latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload research artifact
        uses: actions/upload-artifact@v4
        with:
          name: research-pipeline
          path: |
            generated/research/latest.json
            generated/research/latest.md
