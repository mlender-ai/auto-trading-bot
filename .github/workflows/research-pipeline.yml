name: Research Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - generated/research/**
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: research-automation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    env:
      RESEARCH_PIPELINE_PROVIDER: auto
      AI_API_URL: ${{ secrets.AI_API_URL }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_MODEL: ${{ secrets.AI_MODEL }}
      AI_TEMPERATURE: ${{ secrets.AI_TEMPERATURE }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate AI configuration
        shell: bash
        run: |
          test -n "$GITHUB_TOKEN"

      - name: Generate research pipeline
        run: npm run research:generate

      - name: Publish generated snapshot to repository
        shell: bash
        run: |
          if git diff --quiet -- generated/research/latest.json generated/research/latest.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/research/latest.json generated/research/latest.md
          git commit -m "chore: publish research snapshot [skip ci]"
          git push

      - name: Publish agent thread to job summary
        run: cat generated/research/latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload research artifact
        uses: actions/upload-artifact@v4
        with:
          name: research-pipeline
          path: |
            generated/research/latest.json
            generated/research/latest.md
