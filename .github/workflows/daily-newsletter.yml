name: Daily Newsletter

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

concurrency:
  group: research-automation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  models: read
  pull-requests: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    env:
      RESEARCH_PIPELINE_PROVIDER: auto
      AI_API_URL: ${{ secrets.AI_API_URL }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_MODEL: ${{ secrets.AI_MODEL }}
      AI_TEMPERATURE: ${{ secrets.AI_TEMPERATURE }}
      GITHUB_TOKEN: ${{ github.token }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEWSLETTER_FROM: ${{ secrets.NEWSLETTER_FROM }}
      NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate latest research snapshot
        run: npm run research:generate

      - name: Sync agent action items to GitHub Issues
        run: npm run research:issues

      - name: Publish generated snapshot to repository
        shell: bash
        run: |
          if git diff --quiet -- generated/research/latest.json generated/research/latest.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git stash push -m "pre-publish-generated-snapshot" -- generated/research/latest.json generated/research/latest.md
          git pull --rebase origin "${GITHUB_REF_NAME}"

          npm run research:generate
          npm run research:issues

          if git diff --quiet -- generated/research/latest.json generated/research/latest.md; then
            exit 0
          fi

          git add generated/research/latest.json generated/research/latest.md
          git commit -m "chore: publish daily newsletter snapshot [skip ci]"
          git push

      - name: Deliver newsletter
        run: npm run research:newsletter

      - name: Publish newsletter summary
        run: |
          cat generated/research/latest.md >> "$GITHUB_STEP_SUMMARY"
          if [ -f generated/research/newsletter-preview.html ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Newsletter preview generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload newsletter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-newsletter
          path: |
            generated/research/latest.json
            generated/research/latest.md
            generated/research/newsletter-preview.html
